name: Feature Request

description: Suggest a new feature for Sidra.

title: "[FEATURE]: "

labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        ## Feature Proposal

        Please describe your idea in detail.

  - type: input
    id: title
    attributes:
      label: Feature Title
      placeholder: Luxury Seller Analytics Dashboard
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Explain your idea.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - Authentication
        - Homepage
        - Discovery
        - Seller Studio
        - Products
        - Orders
        - Checkout
        - Wishlist
        - Reviews
        - Notifications
        - Analytics
        - CMS
        - Founder Admin
        - Canvas Engine
        - Firebase
        - Security
        - Other
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing feature requests before creating this one.
          required: true
