name: Release Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    name: Production Release

    runs-on: ubuntu-latest

    environment:
      name: production

    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Production Build
        run: npm run build

      - name: Deploy Firebase App Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RESORA_BD7C5 }}
          projectId: resora-bd7c5

      - name: Release Completed
        run: echo "SIDRA Production Deployment Completed Successfully.”
